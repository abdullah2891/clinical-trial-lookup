services:

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-ctuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ctpass}
      POSTGRES_DB:       ${POSTGRES_DB:-clinical_trials}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ctuser} -d ${POSTGRES_DB:-clinical_trials}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"   # host 5433 → container 5432 (avoids clash with local Postgres)

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ctuser}:${POSTGRES_PASSWORD:-ctpass}@db:5432/${POSTGRES_DB:-clinical_trials}
      REDIS_URL:    redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    volumes:
      # Mount adapter weights at runtime so they aren't baked into the image
      - ./outputs:/app/outputs:ro

  # ── React frontend (nginx) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"

  # ── ETL worker (one-shot ingestion; run with: docker compose run --rm etl) ──
  etl:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ctuser}:${POSTGRES_PASSWORD:-ctpass}@db:5432/${POSTGRES_DB:-clinical_trials}
      REDIS_URL:    redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "etl.pipeline"]
    profiles:
      - tools   # only started when explicitly requested

volumes:
  pgdata:
  redisdata:
