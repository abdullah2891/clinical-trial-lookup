# Production compose — STANDALONE file, not an override.
# Run with:  docker compose -f docker-compose.prod.yml up -d --build
#
# Differences from docker-compose.yml (dev):
#   - only nginx (frontend) publishes a host port (80)
#   - db/redis/api are internal-only
#   - no dev source mounts — code is baked into the image at build time

services:

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    command: postgres -c maintenance_work_mem=2GB -c work_mem=64MB
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-ctuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ctpass}
      POSTGRES_DB:       ${POSTGRES_DB:-clinical_trials}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ctuser} -d ${POSTGRES_DB:-clinical_trials}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL:       postgresql://${POSTGRES_USER:-ctuser}:${POSTGRES_PASSWORD:-ctpass}@db:5432/${POSTGRES_DB:-clinical_trials}
      REDIS_URL:          redis://redis:6379
      MODAL_ENDPOINT_URL: ""   # GPT-4o-mini screening path (no Modal cold starts)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"

  # One-shot ingestion:  docker compose -f docker-compose.prod.yml run --rm etl
  etl:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ctuser}:${POSTGRES_PASSWORD:-ctpass}@db:5432/${POSTGRES_DB:-clinical_trials}
      REDIS_URL:    redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "etl.pipeline"]
    profiles:
      - tools

volumes:
  pgdata:
  redisdata:
